    <ellipse cx="520" cy="360" rx="180" ry="110" fill="#dc143c" transform="rotate(-18 520 360)"/>
    <ellipse cx="680" cy="340" rx="190" ry="105" fill="#ff5c7a" transform="rotate(12 680 340)"/>
    <ellipse cx="600" cy="430" rx="200" ry="120" fill="#9b111e" transform="rotate(6 600 430)"/>
